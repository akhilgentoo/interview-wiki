name: Deploy to GitHub Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main", "master"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      - name: Build site
        run: |
          # Create a build directory
          mkdir -p _site
          
          # Copy all necessary files to build directory
          cp index.html _site/
          cp app.js _site/
          cp styles.css _site/
          cp README.md _site/
          
          # Copy PDFs directory if it exists
          if [ -d "pdfs" ]; then
            cp -r pdfs _site/
          else
            mkdir -p _site/pdfs
            echo "PDFs directory created. Add your PDF files to the pdfs/ directory in your repository."
          fi
          
          # Create a simple .nojekyll file to bypass Jekyll processing
          touch _site/.nojekyll
          
          # Optional: Create a CNAME file if you have a custom domain
          # echo "yourdomain.com" > _site/CNAME
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
