<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Wiki - Tech Blog</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
</head>
<body>
    <!-- Navigation Header -->
    <header class="header">
        <nav class="nav">
            <div class="nav-brand">
                <h1>Interview Wiki</h1>
                <span class="nav-tagline">Tech Interview Resources</span>
            </div>
            <div class="nav-actions">
                <button class="search-toggle" id="searchToggle">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                </button>
                <button class="theme-toggle" id="themeToggle">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                </button>
            </div>
        </nav>
        
        <!-- Search Bar -->
        <div class="search-container" id="searchContainer">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search articles, topics, or technologies...">
                <button class="search-close" id="searchClose">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-content">
                <div class="categories">
                    <h3>Categories</h3>
                    <ul class="category-list" id="categoryList">
                        <li><a href="#" data-category="all" class="active">All Documents</a></li>
                    </ul>
                </div>
                
                <div class="tags">
                    <h3>Popular Tags</h3>
                    <div class="tag-cloud" id="tagCloud">
                        <span class="tag">AWS</span>
                        <span class="tag">Cloud</span>
                        <span class="tag">CI/CD</span>
                        <span class="tag">DevOps</span>
                        <span class="tag">Terraform</span>
                        <span class="tag">IaC</span>
                        <span class="tag">Interview</span>
                        <span class="tag">Setup</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Content Area -->
        <div class="content">
            <!-- Blog List View -->
            <div class="blog-list" id="blogList">
                <div class="content-header">
                    <h2>PDF Documents</h2>
                    <div class="sort-controls">
                        <button class="refresh-btn" id="refreshBtn" title="Refresh PDF documents">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="23 4 23 10 17 10"></polyline>
                                <polyline points="1 20 1 14 7 14"></polyline>
                                <path d="m3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                            </svg>
                            Refresh
                        </button>
                        <select id="sortSelect">
                            <option value="date">Sort by Date</option>
                            <option value="title">Sort by Title</option>
                            <option value="category">Sort by Category</option>
                        </select>
                    </div>
                </div>
                
                <div class="articles-grid" id="articlesGrid">
                    <!-- Articles will be dynamically inserted here -->
                </div>
            </div>

            <!-- Article Reader View -->
            <div class="article-reader" id="articleReader" style="display: none;">
                <button class="back-button" id="backButton">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="m12 19-7-7 7-7"></path>
                        <path d="m19 12H5"></path>
                    </svg>
                    Back to Articles
                </button>
                
                <article class="article-content" id="articleContent">
                    <!-- Article content will be dynamically inserted here -->
                </article>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2024 Interview Wiki. Built for tech interview preparation.</p>
            <div class="footer-links">
                <a href="#about">About</a>
                <a href="#contact">Contact</a>
                <a href="#resources">Resources</a>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        // Configure PDF.js worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>
    <script src="app.js"></script>
</body>
</html>
